# ============================================================
# Experimento 3 — Modelo más grande: yolo11s-seg
# ============================================================
# Objetivo: Evaluar si un modelo con ~3× más parámetros
#           puede aprender mejor las clases minoritarias.
#
# Cambios vs Experimento 1:
#   - Modelo: yolo11n-seg → yolo11s-seg (~3× parámetros)
#   - batch_size: 16 → 8 (compensar mayor uso de VRAM)
#   - Aumentación moderada (entre exp 1 y exp 2)
# ============================================================

project:
  name: "alternaria-seg"
  version: "1.0.0"
  seed: 42

data:
  root: "data/processed/segmentation"
  classes: ["conidia", "conidia-multiseptada", "hifa"]
  image_size: 640
  annotation_format: "yolo_seg"

model:
  architecture: "yolo11s-seg"
  pretrained_weights: "yolo11s-seg.pt"
  num_classes: 3

training:
  epochs: 200
  batch_size: 4
  imgsz: 640
  lr0: 5.0e-4
  lrf: 0.01
  patience: 20

  # Optimizador y scheduler
  optimizer: "AdamW"
  cos_lr: true
  warmup_epochs: 5.0
  close_mosaic: 15

  # Aumentación moderada
  degrees: 180.0
  mosaic: 0.6
  copy_paste: 0.7
  mixup: 0.1
  scale: 0.3
  translate: 0.15

metrics:
  report: ["mAP50", "mAP50_95", "precision", "recall", "iou_per_class"]

checkpoints:
  save_dir: "checkpoints/segmentation"
  monitor: "mAP50"
